<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">


<title>Hummingbird商品知識クイズ</title>
<script src="questions-material.js"></script>
<script src="questions-care.js"></script>
<script src="questions-customer.js"></script>
<script src="questions-global.js"></script>
<script src="questions-product.js"></script>

<script>
const QUIZ_QUESTIONS = [
  ...(typeof QUESTIONS_MATERIAL !== "undefined" ? QUESTIONS_MATERIAL : []),
  ...(typeof QUESTIONS_CARE !== "undefined" ? QUESTIONS_CARE : []),
  ...(typeof QUESTIONS_CUSTOMER !== "undefined" ? QUESTIONS_CUSTOMER : []),
  ...(typeof QUESTIONS_GLOBAL !== "undefined" ? QUESTIONS_GLOBAL : []),
  ...(typeof QUESTIONS_PRODUCT !== "undefined" ? QUESTIONS_PRODUCT : [])
];
</script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:#f4eee5;
  margin:0;
  padding:20px;
  color:#2b2118;
}
.card{
  background:white;
  max-width:720px;
  margin:auto;
  padding:24px;
  border-radius:22px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}
h1{text-align:center;}
button{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:#8f7a52;
  color:white;
  font-size:18px;
  font-weight:bold;
}
input[type="text"]{
  width:100%;
  box-sizing:border-box;
  padding:13px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}
.choice{
  display:block;
  padding:14px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:12px;
  background:white;
}
.correct{background:#dff3e6;border-color:#6fbf8a;}
.wrong{background:#ffe2dc;border-color:#d66a5b;}
.explain{
  background:#f7f1e8;
  padding:14px;
  border-radius:14px;
  margin-top:16px;
  line-height:1.7;
}
.result{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  margin:20px 0;
}
.scoreBox{
  background:#f7f1e8;
  padding:14px;
  border-radius:14px;
  margin:12px 0;
}
.scoreRow{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #e0d5c6;
  padding:10px 0;
}
.scoreRow:last-child{
  border-bottom:none;
}

.hidden{
  display:none;
}

.small{
  color:#7b6a58;
  font-size:14px;
  text-align:center;
}

.quizImage,
.explainImage{
  width:100%;
  max-height:350px;
  object-fit:cover;
  border-radius:14px;
  margin:15px 0;
}

</style>
</head>

<body>
<div class="card">

<div id="startScreen">
  <h1>Hummingbird<br>商品知識クイズ</h1>
  <p class="small">解説表示・複数回答・カテゴリ別スコア対応</p>

  <p>スタッフ名</p>
  <input id="staffName" type="text" placeholder="例：えなみ">

  <button onclick="startQuiz()">クイズ開始</button>
</div>

<div id="quizScreen" class="hidden">
  <p id="categoryLabel" class="small"></p>
  <h2 id="questionNumber"></h2>
  <h3 id="questionText"></h3>
  <div id="questionImage"></div>
  <div id="choices"></div>
  <div id="feedback"></div>
</div>

<div id="resultScreen" class="hidden">
  <div class="result">クイズ終了！</div>

  <p id="scoreText" class="small"></p>

  <div id="categoryScores" class="scoreBox"></div>

  <div id="bonusGame"></div>

  <button onclick="location.reload()">
    もう一度挑戦
  </button>
</div>

</div>

<script>
let current = 0;
let score = 0;
let quiz = [];
let staffName = "";
let answered = false;

let categoryStats = {};

function shuffle(array){

  const arr = [...array];

  for(let i = arr.length - 1; i > 0; i--){

    const j =
      Math.floor(Math.random() * (i + 1));

    [arr[i], arr[j]]
      = [arr[j], arr[i]];
  }

  return arr;
}

function startQuiz(){

  staffName =
    document.getElementById("staffName").value || "スタッフ";

  quiz = [];

  // 素材知識3問
  const materialQuestions =
    shuffle(
      QUIZ_QUESTIONS.filter(
        q => q.category === "素材知識"
      )
    ).slice(0,3);

  quiz.push(...materialQuestions);

  // 商品知識3問
  const productQuestions =
    shuffle(
      QUIZ_QUESTIONS.filter(
        q => q.category === "商品知識"
      )
    ).slice(0,3);

  quiz.push(...productQuestions);

  // すでに選ばれた問題を除外
  const usedQuestions =
    [...materialQuestions, ...productQuestions];

  // 残り1問は素材知識 or 商品知識から
  const extraCore =
    QUIZ_QUESTIONS.filter(
      q =>
        (
          q.category === "素材知識" ||
          q.category === "商品知識"
        ) &&
        !usedQuestions.includes(q)
    );

  quiz.push(
    ...shuffle(extraCore).slice(0,1)
  );

  // 接客知識1問
  quiz.push(
    ...shuffle(
      QUIZ_QUESTIONS.filter(
        q => q.category === "接客知識"
      )
    ).slice(0,1)
  );

  // 海外対応1問
  quiz.push(
    ...shuffle(
      QUIZ_QUESTIONS.filter(
        q => q.category === "海外対応"
      )
    ).slice(0,1)
  );

  // お手入れ1問
  quiz.push(
    ...shuffle(
      QUIZ_QUESTIONS.filter(
        q => q.category === "お手入れ"
      )
    ).slice(0,2)
  );

// 最後に全体をシャッフル
quiz = shuffle(quiz);

if(quiz.length === 0){
  alert("問題が読み込めていません。questions-〇〇.js のどれかにエラーがある可能性があります。");
  return;
}

  categoryStats = {};

  quiz.forEach(q => {

    if(!categoryStats[q.category]){

      categoryStats[q.category] = {
        correct:0,
        total:0
      };

    }

  });

  document.getElementById("startScreen")
    .classList.add("hidden");

  document.getElementById("quizScreen")
    .classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  answered = false;
  const q = quiz[current];

  document.getElementById("feedback").innerHTML = "";

  document.getElementById("categoryLabel").innerHTML =
    `カテゴリ：${q.category}　｜　${q.type === "multiple" ? "複数選択" : "単一選択"}`;

  document.getElementById("questionNumber").innerHTML =
    `問題 ${current + 1} / ${quiz.length}`;

  document.getElementById("questionText").innerHTML = q.question;
const imageArea =
document.getElementById("questionImage");

if(q.image){
  imageArea.innerHTML = `
    <img
      src="${q.image}"
      class="quizImage"
    >
  `;
}else{
  imageArea.innerHTML = "";
}

  const area = document.getElementById("choices");
  area.innerHTML = "";

  const shuffledChoices = q.choices.map((text, index) => ({
    text,
    originalIndex:index
  }));

  shuffle(shuffledChoices).forEach(choice => {
    const label = document.createElement("label");
    label.className = "choice";

    if(q.type === "multiple"){
      label.innerHTML =
        `<input type="checkbox" value="${choice.originalIndex}"> ${choice.text}`;
    }else{
      label.innerHTML =
        `<input type="radio" name="answer" value="${choice.originalIndex}"> ${choice.text}`;
    }

    area.appendChild(label);
  });

  const answerButton = document.createElement("button");
  answerButton.innerText = "回答する";
  answerButton.onclick = checkAnswer;
  area.appendChild(answerButton);
}

function checkAnswer(){
  if(answered) return;

  const q = quiz[current];
  let selected = [];

  if(q.type === "multiple"){
    document.querySelectorAll("input[type=checkbox]:checked").forEach(el => {
      selected.push(Number(el.value));
    });

    if(selected.length === 0){
      alert("回答を選んでください");
      return;
    }
  }else{
    const checked = document.querySelector("input[type=radio]:checked");

    if(!checked){
      alert("回答を選んでください");
      return;
    }

    selected.push(Number(checked.value));
  }

  answered = true;

  selected.sort();
  const answer = [...q.correct].sort();

  const isCorrect = JSON.stringify(selected) === JSON.stringify(answer);

  categoryStats[q.category].total++;

  if(isCorrect){
    score++;
    categoryStats[q.category].correct++;
  }

  document.querySelectorAll(".choice").forEach(label => {
    const input = label.querySelector("input");
    const value = Number(input.value);

    input.disabled = true;

    if(q.correct.includes(value)){
      label.classList.add("correct");
    }

    if(selected.includes(value) && !q.correct.includes(value)){
      label.classList.add("wrong");
    }
  });

  document.getElementById("feedback").innerHTML = `
  <div class="explain">

    <strong>
      ${isCorrect ? "正解！" : "不正解！"}
    </strong>

    <br><br>

    ${q.explanation || "解説はありません。"}

    ${
      q.explanationImage
      ? `<img src="${q.explanationImage}"
         class="explainImage">`
      : ""
    }

    <br><br>

    <button onclick="nextQuestion()">
      次へ
    </button>

  </div>
`;
}

function nextQuestion(){
  current++;

  if(current >= quiz.length){
    finishQuiz();
    return;
  }

  showQuestion();
}

function finishQuiz(){
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const percent = Math.round(score / quiz.length * 100);

  let rank = "🌱 見習いスタッフ";
  let comment = "まずは素材の基礎から復習しよう！";

if(percent === 100){
  rank = "👑 神鳥（ゴッドハミングバード）";
  comment = "全問正解。もはや店長を教育する側。ジュースチャレンジ権獲得。";
}
else if(percent >= 95){
  rank = "🏆 Hummingbirdマスター";
  comment = "ほぼ完璧。変態問題まで理解している。";
}
else if(percent >= 90){
  rank = "✨ 天然素材の申し子";
  comment = "素材・接客・商品知識ともにかなり強い。";
}
else if(percent >= 85){
  rank = "🦉 素材オタク";
  comment = "休憩中に繊維長の話を始めるタイプ。";
}
else if(percent >= 80){
  rank = "🎩 上級アドバイザー";
  comment = "お客様にも自信を持って説明できるレベル。";
}
else if(percent >= 75){
  rank = "🌿 天然素材ソムリエ";
  comment = "かなり良い感じ。あと一歩で上級者。";
}
else if(percent >= 70){
  rank = "🧦 靴下研究員";
  comment = "知識はある。だが変態領域にはまだ遠い。";
}
else if(percent >= 65){
  rank = "🧵 素材アドバイザー";
  comment = "基礎は身についている。解説を読めばもっと伸びる。";
}
else if(percent >= 60){
  rank = "📚 勉強熱心スタッフ";
  comment = "やる気は感じる。まだ覚醒前。";
}
else if(percent >= 55){
  rank = "🐣 接客訓練生";
  comment = "知識より愛嬌で乗り切っている可能性あり。";
}
else if(percent >= 50){
  rank = "🌱 見習いスタッフ";
  comment = "まずは素材タグを読むところから始めよう。";
}
else if(percent >= 45){
  rank = "🤔 雰囲気接客職人";
  comment = "説明はふわっとしているが、なぜか売れる時がある。";
}
else if(percent >= 40){
  rank = "🚨 商品説明事故予備軍";
  comment = "その説明、本当に合ってる？お客様が詳しいと危険。";
}
else if(percent >= 35){
  rank = "📖 ラベル読み係";
  comment = "接客中にタグを確認したくなるレベル。";
}
else if(percent >= 30){
  rank = "🥔 通りすがりのお客様";
  comment = "まだスタッフ側ではなく、お客様側の知識量。";
}
else if(percent >= 25){
  rank = "🫥 店内で迷子";
  comment = "たぶん今どの商品説明してるか途中で忘れる。";
}
else if(percent >= 20){
  rank = "🦆 ハミングバード新人研修1日目";
  comment = "とりあえずリネンとウールの違いから復習しよう。";
}
else if(percent >= 15){
  rank = "🧠 知識メモリ空き容量99%";
  comment = "まだまだ新しい知識がたくさん入る。";
}
else if(percent >= 10){
  rank = "🐟 商品知識ブラックホール";
  comment = "覚えた知識が光の速さで吸い込まれている。";
}
else if(percent >= 5){
  rank = "☠️ 素材界の都市伝説";
  comment = "その回答はどこで覚えたんや。";
}
else{
  rank = "💀 伝説級";
  comment = "逆にここまで外す方が難しい。才能を感じる。";
}

  document.getElementById("scoreText").innerHTML = `
    ${staffName}さんの結果<br><br>
    <strong>${score} / ${quiz.length} 問正解</strong><br>
    総合得点 ${percent}点<br><br>

    <div style="
      background:#f7f1e8;
      padding:18px;
      border-radius:18px;
      margin:18px 0;
      font-size:22px;
      font-weight:bold;
      color:#2b2118;
    ">
      ${rank}
    </div>

    <div style="
      background:#fffaf3;
      border:1px solid #e0d5c6;
      padding:14px;
      border-radius:14px;
      line-height:1.7;
      color:#7b6a58;
    ">
      ${comment}
    </div>
  `;

  let html = "<h3 style='text-align:center;'>カテゴリ別スコア</h3>";

  Object.keys(categoryStats).forEach(category => {
    const stat = categoryStats[category];
    const categoryPercent =
      stat.total === 0 ? 0 : Math.round(stat.correct / stat.total * 100);

    html += `
      <div class="scoreRow">
        <span>${category}</span>
        <strong>${categoryPercent}点</strong>
      </div>
    `;
  });


  document.getElementById("categoryScores").innerHTML = html;

  if(percent === 100){
    createBonusGame();
  }
}

let bonusOpened = false;

function createBonusGame(){

  bonusOpened = false;

  const area =
    document.getElementById("bonusGame");

  const cards = [
    "🎁ジュース",
    "🍬飴",
    "🍬飴",
    "🎁店長の笑顔",
    "☕コーヒー系",
    "😭はずれ",
    "😭はずれ",
    "😭はずれ",
    "😭はずれ"
  ];

  cards.sort(() => Math.random() - 0.5);

  let html = `
  <div style="
    margin-top:20px;
    background:#fffaf3;
    border-radius:18px;
    padding:20px;
    text-align:center;
  ">

  <h2>
  🏆100点達成ボーナス🏆
  </h2>

  <p>
  カードを1枚選んでください
  </p>

  <div
  style="
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  ">
  `;

  cards.forEach((card,index)=>{

    html += `
      <button
      id="card${index}"
      onclick="openBonusCard(${index},'${card}')"
      style="
      height:80px;
      font-size:28px;
      ">
      🟨
      </button>
    `;
  });

  html += `
    </div>
    </div>
  `;

  area.innerHTML = html;
}

function openBonusCard(index,result){

  if(bonusOpened) return;

  bonusOpened = true;

  document.getElementById(
    `card${index}`
  ).innerHTML = result;

  if(result === "🎁店長の笑顔"){

    alert(
      "😊おめでとう！\n店長の笑顔を獲得しました！\n※換金不可・返品不可"
    );

  }else if(!result.includes("😭")){

    alert(
      `🎉おめでとう！\n${result}獲得！`
    );

  }else{

    alert(
      "😭ハズレ！\nまた100点目指そう！"
    );

  }
}

</script>

</body>
</html>
