<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">


<title>Hummingbird商品知識クイズ</title>
<script src="questions.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:#f4eee5;
  margin:0;
  padding:20px;
  color:#2b2118;
}
.card{
  background:white;
  max-width:720px;
  margin:auto;
  padding:24px;
  border-radius:22px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}
h1{text-align:center;}
button{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  background:#8f7a52;
  color:white;
  font-size:18px;
  font-weight:bold;
}
input[type="text"]{
  width:100%;
  box-sizing:border-box;
  padding:13px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}
.choice{
  display:block;
  padding:14px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:12px;
  background:white;
}
.correct{background:#dff3e6;border-color:#6fbf8a;}
.wrong{background:#ffe2dc;border-color:#d66a5b;}
.explain{
  background:#f7f1e8;
  padding:14px;
  border-radius:14px;
  margin-top:16px;
  line-height:1.7;
}
.result{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  margin:20px 0;
}
.scoreBox{
  background:#f7f1e8;
  padding:14px;
  border-radius:14px;
  margin:12px 0;
}
.scoreRow{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #e0d5c6;
  padding:10px 0;
}
.scoreRow:last-child{
  border-bottom:none;
}

.hidden{
  display:none;
}

.small{
  color:#7b6a58;
  font-size:14px;
  text-align:center;
}

.quizImage,
.explainImage{
  width:100%;
  max-height:350px;
  object-fit:cover;
  border-radius:14px;
  margin:15px 0;
}

</style>
</head>

<body>
<div class="card">

<div id="startScreen">
  <h1>Hummingbird<br>商品知識クイズ</h1>
  <p class="small">解説表示・複数回答・カテゴリ別スコア対応</p>

  <p>スタッフ名</p>
  <input id="staffName" type="text" placeholder="例：えなみ">

  <button onclick="startQuiz()">クイズ開始</button>
</div>

<div id="quizScreen" class="hidden">
  <p id="categoryLabel" class="small"></p>
  <h2 id="questionNumber"></h2>
  <h3 id="questionText"></h3>
  <div id="questionImage"></div>
  <div id="choices"></div>
  <div id="feedback"></div>
</div>

<div id="resultScreen" class="hidden">
  <div class="result">クイズ終了！</div>
  <p id="scoreText" class="small"></p>
  <div id="categoryScores" class="scoreBox"></div>
  <button onclick="location.reload()">もう一度挑戦</button>
</div>

</div>

<script>
let current = 0;
let score = 0;
let quiz = [];
let staffName = "";
let answered = false;

let categoryStats = {};

function shuffle(arr){
  return [...arr].sort(() => Math.random() - 0.5);
}

function startQuiz(){
  staffName = document.getElementById("staffName").value || "スタッフ";
  quiz = shuffle(QUIZ_QUESTIONS).slice(0,10);

  categoryStats = {};
  quiz.forEach(q => {
    if(!categoryStats[q.category]){
      categoryStats[q.category] = { correct:0, total:0 };
    }
  });

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  answered = false;
  const q = quiz[current];

  document.getElementById("feedback").innerHTML = "";

  document.getElementById("categoryLabel").innerHTML =
    `カテゴリ：${q.category}　｜　${q.type === "multiple" ? "複数選択" : "単一選択"}`;

  document.getElementById("questionNumber").innerHTML =
    `問題 ${current + 1} / ${quiz.length}`;

  document.getElementById("questionText").innerHTML = q.question;
const imageArea =
document.getElementById("questionImage");

if(q.image){
  imageArea.innerHTML = `
    <img
      src="${q.image}"
      class="quizImage"
    >
  `;
}else{
  imageArea.innerHTML = "";
}

  const area = document.getElementById("choices");
  area.innerHTML = "";

  const shuffledChoices = q.choices.map((text, index) => ({
    text,
    originalIndex:index
  }));

  shuffle(shuffledChoices).forEach(choice => {
    const label = document.createElement("label");
    label.className = "choice";

    if(q.type === "multiple"){
      label.innerHTML =
        `<input type="checkbox" value="${choice.originalIndex}"> ${choice.text}`;
    }else{
      label.innerHTML =
        `<input type="radio" name="answer" value="${choice.originalIndex}"> ${choice.text}`;
    }

    area.appendChild(label);
  });

  const answerButton = document.createElement("button");
  answerButton.innerText = "回答する";
  answerButton.onclick = checkAnswer;
  area.appendChild(answerButton);
}

function checkAnswer(){
  if(answered) return;

  const q = quiz[current];
  let selected = [];

  if(q.type === "multiple"){
    document.querySelectorAll("input[type=checkbox]:checked").forEach(el => {
      selected.push(Number(el.value));
    });

    if(selected.length === 0){
      alert("回答を選んでください");
      return;
    }
  }else{
    const checked = document.querySelector("input[type=radio]:checked");

    if(!checked){
      alert("回答を選んでください");
      return;
    }

    selected.push(Number(checked.value));
  }

  answered = true;

  selected.sort();
  const answer = [...q.correct].sort();

  const isCorrect = JSON.stringify(selected) === JSON.stringify(answer);

  categoryStats[q.category].total++;

  if(isCorrect){
    score++;
    categoryStats[q.category].correct++;
  }

  document.querySelectorAll(".choice").forEach(label => {
    const input = label.querySelector("input");
    const value = Number(input.value);

    input.disabled = true;

    if(q.correct.includes(value)){
      label.classList.add("correct");
    }

    if(selected.includes(value) && !q.correct.includes(value)){
      label.classList.add("wrong");
    }
  });

  document.getElementById("feedback").innerHTML = `
  <div class="explain">

    <strong>
      ${isCorrect ? "正解！" : "不正解！"}
    </strong>

    <br><br>

    ${q.explanation || "解説はありません。"}

    ${
      q.explanationImage
      ? `<img src="${q.explanationImage}"
         class="explainImage">`
      : ""
    }

    <br><br>

    <button onclick="nextQuestion()">
      次へ
    </button>

  </div>
`;
}

function nextQuestion(){
  current++;

  if(current >= quiz.length){
    finishQuiz();
    return;
  }

  showQuestion();
}

function finishQuiz(){
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const percent = Math.round(score / quiz.length * 100);

  let rank = "🌱 見習いスタッフ";
  let comment = "まずは素材の基礎から復習しよう！";

  if(percent >= 90){
    rank = "👑 Hummingbirdマイスター";
    comment = "完璧レベル！スタッフ教育も任せられる！";
  }else if(percent >= 75){
    rank = "✨ 天然素材ソムリエ";
    comment = "かなり良い感じ！接客でも自信を持って説明できる！";
  }else if(percent >= 60){
    rank = "🧵 素材アドバイザー";
    comment = "基礎はOK！あと少しでかなり安定する！";
  }else if(percent >= 40){
    rank = "🔰 接客チャレンジャー";
    comment = "伸びしろあり！解説を見ながら復習しよう！";
  }

  document.getElementById("scoreText").innerHTML = `
    ${staffName}さんの結果<br><br>
    <strong>${score} / ${quiz.length} 問正解</strong><br>
    総合得点 ${percent}点<br><br>

    <div style="
      background:#f7f1e8;
      padding:18px;
      border-radius:18px;
      margin:18px 0;
      font-size:22px;
      font-weight:bold;
      color:#2b2118;
    ">
      ${rank}
    </div>

    <div style="
      background:#fffaf3;
      border:1px solid #e0d5c6;
      padding:14px;
      border-radius:14px;
      line-height:1.7;
      color:#7b6a58;
    ">
      ${comment}
    </div>
  `;

  let html = "<h3 style='text-align:center;'>カテゴリ別スコア</h3>";

  Object.keys(categoryStats).forEach(category => {
    const stat = categoryStats[category];
    const categoryPercent =
      stat.total === 0 ? 0 : Math.round(stat.correct / stat.total * 100);

    html += `
      <div class="scoreRow">
        <span>${category}</span>
        <strong>${categoryPercent}点</strong>
      </div>
    `;
  });

  document.getElementById("categoryScores").innerHTML = html;
}

</script>

</body>
</html>
