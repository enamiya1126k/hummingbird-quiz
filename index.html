<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hummingbirdクイズ</title>

<style>
body{
font-family:sans-serif;
background:#f5efe6;
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
border:none;
border-radius:10px;
background:#8b6f47;
color:white;
font-size:16px;
}

button:hover{
opacity:.9;
}

#result{
font-size:24px;
font-weight:bold;
text-align:center;
margin-top:20px;
}
</style>

</head>
<body>

<div class="card">

<h1>Hummingbird商品知識クイズ</h1>

<div id="quiz"></div>

<div id="result"></div>

</div>

<script>

const questions = [

{
q:"リネンの特徴は？",
a:[
"吸湿性が高い",
"防水素材",
"化学繊維",
"革素材"
],
correct:0
},

{
q:"ギザコットンは？",
a:[
"高級綿",
"羊毛",
"麻",
"ナイロン"
],
correct:0
},

{
q:"ストレスフリーソックスの特徴は？",
a:[
"ゴムを極力使わない履き心地",
"防水",
"安全靴",
"厚底"
],
correct:0
}

];

let current=0;
let score=0;

function showQuestion(){

if(current>=questions.length){

document.getElementById("quiz").innerHTML="";

document.getElementById("result").innerHTML=
"結果："+score+" / "+questions.length;

return;
}

const q=questions[current];

let html="<h2>"+q.q+"</h2>";

q.a.forEach((choice,index)=>{

html+=`
<button onclick="answer(${index})">
${choice}
</button>
`;

});

document.getElementById("quiz").innerHTML=html;
}

function answer(index){

if(index===questions[current].correct){
score++;
}

current++;

showQuestion();
}

showQuestion();

</script>

</body>
</html>
