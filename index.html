<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Hummingbird商品知識クイズ</title>

<script src="questions.js"></script>

<style>
body{
font-family:-apple-system,sans-serif;
background:#f4eee5;
margin:0;
padding:20px;
color:#2b2118;
}

.card{
background:white;
max-width:700px;
margin:auto;
padding:24px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
background:#8f7a52;
color:white;
font-size:18px;
}

.choice{
display:block;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:12px;
background:white;
}

.result{
font-size:22px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="card">

<div id="startScreen">

<h1>Hummingbird商品知識クイズ</h1>

<p>スタッフ名</p>
<input id="staffName" style="width:100%;padding:12px">

<button onclick="startQuiz()">
クイズ開始
</button>

</div>

<div id="quizScreen" class="hidden">

<h2 id="questionNumber"></h2>

<h3 id="questionText"></h3>

<div id="choices"></div>

<button onclick="nextQuestion()">
次へ
</button>

</div>

<div id="resultScreen" class="hidden">

<div class="result">
クイズ終了！
</div>

<p id="scoreText"></p>

<button onclick="location.reload()">
もう一度挑戦
</button>

</div>

</div>

<script>

let current=0;
let score=0;
let quiz=[];

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function startQuiz(){

quiz=shuffle(QUIZ_QUESTIONS).slice(0,20);

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

showQuestion();

}

function showQuestion(){

const q=quiz[current];

document.getElementById("questionNumber").innerHTML=
`問題 ${current+1} / ${quiz.length}`;

document.getElementById("questionText").innerHTML=
q.question;

const area=document.getElementById("choices");

area.innerHTML="";

q.choices.forEach((choice,index)=>{

const label=document.createElement("label");

label.className="choice";

if(q.type==="multiple"){

label.innerHTML=
`
<input type="checkbox" value="${index}">
${choice}
`;

}else{

label.innerHTML=
`
<input type="radio" name="answer" value="${index}">
${choice}
`;

}

area.appendChild(label);

});

}

function nextQuestion(){

const q=quiz[current];

let selected=[];

if(q.type==="multiple"){

document
.querySelectorAll("input[type=checkbox]:checked")
.forEach(el=>{
selected.push(Number(el.value));
});

}else{

const checked=
document.querySelector("input[type=radio]:checked");

if(!checked){
alert("回答を選んでください");
return;
}

selected.push(Number(checked.value));

}

selected.sort();

const answer=[...q.correct].sort();

if(JSON.stringify(selected)===JSON.stringify(answer)){
score++;
}

current++;

if(current>=quiz.length){
finishQuiz();
return;
}

showQuestion();

}

function finishQuiz(){

document.getElementById("quizScreen")
.classList.add("hidden");

document.getElementById("resultScreen")
.classList.remove("hidden");

const percent=
Math.round(score/quiz.length*100);

document.getElementById("scoreText")
.innerHTML=
`
${score} / ${quiz.length} 問正解<br><br>
正答率 ${percent}%
`;

}

</script>

</body>
</html>
